# Build binary wheels for all supported platforms and publish to PyPI.
#
# Triggered automatically when you push a version tag (e.g. v2.12.1).
# Can also be triggered manually from the Actions tab (workflow_dispatch).
#
# Publishing uses PyPI Trusted Publishing (OIDC) — no API token required.

name: Build and publish

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

# Force Node.js 24 for all JavaScript-based actions (checkout, upload, etc.)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── 1. Build wheels (C++ compiled) ─────────────────────────────────────────
  build_wheels:
    name: Wheels · ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
          - os: windows-latest
          - os: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.23
        env:
          CIBW_ARCHS_MACOS: "arm64 x86_64"
          MACOSX_DEPLOYMENT_TARGET: "14.0"
          CIBW_SKIP: "pp* cp38-* cp39-*"
          CIBW_BUILD_VERBOSITY: 1

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: dist-wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  # ── 2. Build source distribution ───────────────────────────────────────────
  build_sdist:
    name: Source distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build sdist
        run: pipx run build --sdist

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: dist-sdist
          path: dist/*.tar.gz

  # ── 3. Publish to PyPI ──────────────────────────────────────────────────────
  publish:
    name: Publish to PyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest

    if: startsWith(github.ref, 'refs/tags/v')

    environment:
      name: pypi
      url: https://pypi.org/project/hvrt/

    permissions:
      id-token: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          merge-multiple: true
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
